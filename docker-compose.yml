# =============================================================================
# NKS — Docker Compose (lengkap)
# =============================================================================
# Dua perkhidmatan:
#   - admin-web  → Panel admin (SPA). Domain: https://nks.sena.my
#   - api-server → REST API. Domain: https://nks-api.sena.my
#
# Coolify: Pasang domain nks.sena.my pada admin-web (port 80) dan
#          nks-api.sena.my pada api-server (port 4000).
# =============================================================================

services:
  api-server:
    build:
      context: .
      dockerfile: apps/api-server/Dockerfile
    container_name: nks-api-server
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - apps/api-server/.env
    environment:
      PORT: 4000
      NODE_ENV: production
      # Asal yang dibenarkan (mesti termasuk domain panel admin)
      CORS_ORIGIN: "https://nks.sena.my"
      SESSION_SECRET: "${SESSION_SECRET:-change-me-in-production}"
      SESSION_TTL_HOURS: "${SESSION_TTL_HOURS:-24}"
      COOKIE_NAME: "${COOKIE_NAME:-cms_session}"
      CSRF_COOKIE_NAME: "${CSRF_COOKIE_NAME:-cms_csrf}"
      UPLOAD_DIR: uploads
      MAX_UPLOAD_MB: "${MAX_UPLOAD_MB:-5}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@example.com}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin12345}"
      ADMIN_NAME: "${ADMIN_NAME:-Administrator}"
      # OpenAI (AI File Parser) — pilihan
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      # PGP untuk fail JAN
      JAN_PGP_PASSWORD: "${JAN_PGP_PASSWORD:-}"
      # DB — wajib; set dalam .env atau Coolify (contoh: mysql://user:pass@host:3306/nks)
      DATABASE_URL: "${DATABASE_URL}"
    volumes:
      - api_uploads:/app/apps/api-server/uploads
    # API hanya listen selepas MySQL OK + db push + seed (boleh >60s). Jangan gagalkan deploy.
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 90s

  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
      args:
        # Panel panggil API di subdomain ini (nks-api.sena.my)
        VITE_API_BASE_URL: "https://nks-api.sena.my"
    container_name: nks-admin-web
    restart: unless-stopped
    ports:
      - "80:80"
    # Mulakan selepas api-server dicipta (jangan tunggu healthy — API mungkin perlahan sambung MySQL)
    depends_on:
      - api-server

volumes:
  api_uploads:
