services:
  api-server:
    build:
      context: .
      dockerfile: apps/api-server/Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - apps/api-server/.env
    environment:
      PORT: 4000
      NODE_ENV: production
      CORS_ORIGIN: "http://localhost:5173,http://localhost:80"
      SESSION_SECRET: "${SESSION_SECRET:-change-me-in-production}"
      SESSION_TTL_HOURS: 24
      UPLOAD_DIR: uploads
      MAX_UPLOAD_MB: 5
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@example.com}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin12345}"
      JAN_PGP_PASSWORD: "${JAN_PGP_PASSWORD:-nks-jan-dev-2025}"
    volumes:
      - api_uploads:/app/apps/api-server/uploads

  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
      args:
        # API URL as seen from the browser (user's machine)
        VITE_API_BASE_URL: "http://localhost:4000"
    ports:
      - "5173:80"
    depends_on:
      - api-server

volumes:
  api_uploads:
