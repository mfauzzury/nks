# Same-origin Option A: browser → https://nks.sena.my → nginx serves SPA;
# /api and /uploads are proxied to the API container (Docker service name api-server:4000).
# For Coolify with a different internal hostname, replace api-server:4000 or use envsubst template.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API (Express mounts everything under /api)
    location /api/ {
        proxy_pass http://api-server:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        # Large JSON / uploads through API
        client_max_body_size 25m;
    }

    # Static uploads served by API
    location /uploads/ {
        proxy_pass http://api-server:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: all other routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
